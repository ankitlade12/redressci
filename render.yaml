services:
  - type: web
    name: redressci
    runtime: docker
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: REDRESSCI_AUTH_SECRET
        generateValue: true
      - key: REDRESSCI_STORAGE_KEY
        generateValue: true
      - key: REDRESSCI_ESCROW_KEY
        generateValue: true
      - key: REDRESSCI_PERSIST
        value: "1"
      - key: REDRESSCI_STORAGE_REGION
        value: us
      - key: OPENAI_API_KEY
        sync: false
      - key: REDRESSCI_AI_RATE_LIMIT_PER_HOUR
        value: "20"
